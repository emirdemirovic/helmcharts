# templates/ingress-grpc.yaml
{{- if .Values.ingressGrpc.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress-grpc
  namespace: {{ .Values.nameSpace }}
  annotations:
    {{- toYaml .Values.ingressGrpc.annotations | nindent 4 }}
spec:
  rules:
    - host: {{ .Values.ingressGrpc.host | quote }}
      http:
        paths:
          {{- if .Values.ingressGrpc.paths }}
          {{- range .Values.ingressGrpc.paths }}
          - path: {{ . }}
            pathType: Prefix
            backend:
              service:
                name: {{ $.Release.Name }}
                port:
                  number: {{ $.Values.ingressGrpc.port }}
          {{- end }}
          {{- end }}
{{- end }}
